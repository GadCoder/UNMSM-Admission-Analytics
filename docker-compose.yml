services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unmsm_admission_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-unmsm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unmsm_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unmsm} -d ${POSTGRES_DB:-unmsm_admission_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "60", "1000", "--appendonly", "yes"]
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://unmsm:unmsm_change_me@postgres:5432/unmsm_admission_analytics}
      VALKEY_URL: ${VALKEY_URL:-redis://valkey:6379/0}
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS:-3600}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-["http://localhost:5173"]}
      APP_NAME: ${APP_NAME:-UNMSM Admission Analytics API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      API_PREFIX: ${API_PREFIX:-}
      DEBUG: ${DEBUG:-false}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me-in-production}
      AUTH_JWT_ALGORITHM: ${AUTH_JWT_ALGORITHM:-HS256}
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-120}
    command: ["sh", "-c", "uv run alembic -c alembic.ini upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    expose:
      - "80"

volumes:
  postgres_data:
  valkey_data:
